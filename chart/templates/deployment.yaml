apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "notes-app.fullname" . }}
  labels:
    {{- include "notes-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "notes-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "notes-app.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: notes-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.service.port | quote }}
            - name: NOTES_DB_PATH
              value: {{ printf "%s/notes.db" .Values.persistence.mountPath | quote }}
          volumeMounts:
            - name: notes-data
              mountPath: {{ .Values.persistence.mountPath }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: notes-data
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-data" (include "notes-app.fullname" .)) .Values.persistence.existingClaim }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
